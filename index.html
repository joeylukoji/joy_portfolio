<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Sphère 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* ===== LIGHT MODE — index.html ===== */

        body.light-mode {
            background: #e2e3e7;
            color: #111;
        }

        body.light-mode .ui-layer h1,
        body.light-mode .ui-layer p,
        body.light-mode .ui-layer span,
        body.light-mode .ui-layer div {
            color: #111 !important;
        }
        
        body.light-mode .ui-layer .text-gray-400 {
            color: #555 !important;
        }
        
        body.light-mode .ui-layer .text-gray-500 {
            color: #666 !important;
        }
        
        body.light-mode .ui-layer .text-gray-300 {
            color: #333 !important;
        }
        
        body.light-mode .filter-btn {
            background: rgba(0, 0, 0, 0.07) !important;
            border-color: rgba(0, 0, 0, 0.2) !important;
            color: #111 !important;
        }
        
        body.light-mode .filter-btn.active {
            background: rgba(0, 0, 0, 0.18) !important;
            border-color: rgba(0, 0, 0, 0.4) !important;
        }
        
        body.light-mode .detail-panel {
            background: rgba(245, 245, 250, 0.97) !important;
            border-left: 1px solid rgba(0, 0, 0, 0.1) !important;
            color: #111 !important;
        }
        
        body.light-mode .detail-panel h2,
        body.light-mode .detail-panel h3,
        body.light-mode .detail-panel p,
        body.light-mode .detail-panel li,
        body.light-mode .detail-panel span {
            color: #111 !important;
        }
        
        body.light-mode .detail-panel .text-gray-300,
        body.light-mode .detail-panel .text-gray-400 {
            color: #444 !important;
        }
        
        body.light-mode .close-btn {
            background: rgba(0, 0, 0, 0.08) !important;
            border-color: rgba(0, 0, 0, 0.15) !important;
            color: #111 !important;
        }
        
        body.light-mode .skill-tag {
            background: rgba(0, 0, 0, 0.06) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
            color: #222 !important;
        }
        
        body.light-mode [style*="position:fixed"][style*="left:24px"] a,
        body.light-mode [style*="position:fixed"][style*="right:24px"] a {
            color: #111 !important;
        }
        
        body.light-mode [style*="position:fixed"] div[style*="border-radius:9999px"],
        body.light-mode [style*="position:fixed"] div[style*="border-radius:50%"] {
            background: rgba(255, 255, 255, 0.7) !important;
            border-color: rgba(0, 0, 0, 0.2) !important;
        }

        body.light-mode .loader {
            background: #e2e3e7;
        }

        body.light-mode .spinner {
            border-color: rgba(0, 0, 0, 0.1);
            border-top-color: #111;
        }

        body.light-mode .hover-label {
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            border-color: rgba(0, 0, 0, 0.15);
        }

        body.light-mode .hover-label::after {
            border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
        }
        /* Theme toggle button */
        
        #themeToggle {
            position: fixed;
            bottom: 24px;
            right: 80px;
            z-index: 200;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        
        #themeToggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(20deg);
        }
        
        body.light-mode #themeToggle {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
            color: #111;
        }
        
        body.light-mode #themeToggle:hover {
            background: rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>


    <div class="loader" id="loader">
        <div class="spinner mb-4"></div>
        <div class="text-sm text-gray-400 tracking-widest">CHARGEMENT...</div>
    </div>


    <div id="canvas-container"></div>


    <div class="hover-label" id="hoverLabel">Projet</div>


    <div class="ui-layer flex flex-col justify-between p-6">


        <header class="flex justify-between items-start pointer-events-auto">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter mb-1">MON PORTFOLIO</h1>
                <p class="text-xs text-gray-400 tracking-widest">SPHÈRE INTERACTIVE 3D</p>
            </div>

            <div class="flex gap-2 flex-wrap justify-end max-w-md">
                <button class="filter-btn active px-4 py-2 rounded-full border border-white/20 text-xs backdrop-blur-sm" onclick="filterCategory('all')">
                    Tous
                </button>
                <button class="filter-btn px-4 py-2 rounded-full border border-white/20 text-xs backdrop-blur-sm hover:bg-white/10" onclick="filterCategory('web')">
                    Web
                </button>
                <button class="filter-btn px-4 py-2 rounded-full border border-white/20 text-xs backdrop-blur-sm hover:bg-white/10" onclick="filterCategory('desktop')">
                    Desktop
                </button>
                <button class="filter-btn px-4 py-2 rounded-full border border-white/20 text-xs backdrop-blur-sm hover:bg-white/10" onclick="filterCategory('jeux videos')">
                    Jeux videos
                </button>
                <button class="filter-btn px-4 py-2 rounded-full border border-white/20 text-xs backdrop-blur-sm hover:bg-white/10" onclick="filterCategory('IA')">
                    IA
                </button>
                <button class="filter-btn px-4 py-2 rounded-full border border-white/20 text-xs backdrop-blur-sm hover:bg-white/10" onclick="filterCategory('Recherche')">
                    Recherche
                </button>
            </div>
        </header>


        <!-- Bouton Présentation (gauche) -->
        <div style="position:fixed;left:24px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;align-items:center;gap:10px;" class="pointer-events-auto">
            <a href="presentation.html" style="display:flex;flex-direction:column;align-items:center;gap:10px;text-decoration:none;color:white;" title="Présentation" class="group">
                <div style="writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:0.15em;padding:14px 10px;border-radius:9999px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);font-size:11px;font-weight:600;transition:all 0.3s;">
                    PRÉSENTATION
                </div>
                <div style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;transition:all 0.3s;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M19 12H5M5 12L12 19M5 12L12 5"/>
                    </svg>
                </div>
            </a>
        </div>

        <!-- Bouton Contactez-moi (droite) -->
        <div style="position:fixed;right:24px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;align-items:center;gap:10px;" class="pointer-events-auto">
            <a href="contact.html" style="display:flex;flex-direction:column;align-items:center;gap:10px;text-decoration:none;color:white;" title="Contactez-moi" class="group">
                <div style="writing-mode:vertical-rl;letter-spacing:0.15em;padding:14px 10px;border-radius:9999px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);font-size:11px;font-weight:600;transition:all 0.3s;">
                    CONTACTEZ-MOI
                </div>
                <div style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;transition:all 0.3s;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </a>
        </div>

        <footer class="flex justify-between items-end pointer-events-auto">
            <div class="text-xs text-gray-500">
                <p class="mb-2 text-gray-300">CONTRÔLES</p>
                <div class="flex gap-4">
                    <span class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-white rounded-full"></span> Cliquez pour ouvrir
                    </span>
                    <span class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-white/50 rounded-full"></span> Glissez pour tourner
                    </span>
                    <span class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-white/50 rounded-full"></span> Scroll pour zoomer
                    </span>
                </div>
            </div>

            <div class="text-right">
                <div class="text-3xl font-bold" id="projectCount">0</div>
                <div class="text-xs text-gray-500">PROJETS</div>
            </div>
        </footer>
    </div>


    <div class="detail-panel" id="detailPanel">
        <button class="close-btn" onclick="closeDetail()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="p-8 pt-16">
            <span id="detailCategory" class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-500/20 text-blue-300 border border-blue-500/30 mb-4">
                CATÉGORIE
            </span>

            <h2 id="detailTitle" class="text-4xl font-bold mb-4 leading-tight">Titre du Projet</h2>

            <div class="w-full h-64 bg-gradient-to-br from-gray-800 to-gray-900 rounded-xl mb-6 overflow-hidden border border-white/10">
                <div id="detailImage" class="w-full h-full bg-cover bg-center"></div>
            </div>

            <div class="prose prose-invert max-w-none">
                <p id="detailDescription" class="text-gray-300 leading-relaxed mb-6">
                    Description du projet...
                </p>

                <h3 class="text-lg font-semibold mb-3 text-white">Technologies utilisées</h3>
                <div id="detailSkills" class="flex flex-wrap gap-2 mb-6">

                </div>

                <h3 class="text-lg font-semibold mb-3 text-white">Détails</h3>
                <ul id="detailList" class="space-y-2 text-gray-400 text-sm mb-8">

                </ul>

                <a id="detailLink" href="#" target="_blank" class="inline-flex items-center gap-2 px-6 py-3 bg-white text-black rounded-full font-semibold hover:bg-gray-200 transition">
                    Voir le projet
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 17L17 7M17 7H7M17 7V17"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <button id="themeToggle" onclick="toggleTheme()" title="Changer le thème">
        <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <script src="assets/javascript/script.js"></script>
</body>

</html>
